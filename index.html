<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperTouch · Classic Arcade</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #010008;
    font-family: 'Arial', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── WALLET HUD ── */
  .wallet-hud {
    width: 100%;
    background: #05050f;
    border-bottom: 2px solid #7fffd4;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    gap: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.6);
    position: sticky;
    top: 0;
    z-index: 200;
  }
  .hud-balance {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 8px #ffd70066;
    letter-spacing: 1px;
  }
  .hud-balance .hud-label {
    font-size: 9px;
    color: #224433;
    letter-spacing: 2px;
    font-weight: normal;
    display: block;
    margin-bottom: 1px;
  }
  .hud-free {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 10px;
    font-weight: 900;
    color: #7fffd4;
    letter-spacing: 3px;
  }
  .hud-btn {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 6px;
    border: 2px solid;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s, filter 0.15s;
    background: none;
  }
  .hud-btn:hover { transform: scale(1.06); filter: brightness(1.15); }
  .btn-wallet { background: #0a0a1a; border-color: #ffd700; color: #ffd700; }

  /* ── GAME IFRAME ── */
  .game-wrap {
    width: 100%;
    flex: 1;
  }
  .game-wrap iframe {
    width: 100%;
    height: calc(100vh - 56px);
    border: none;
    display: block;
    background: #010008;
  }
</style>
</head>
<body>

<!-- WALLET HUD -->
<div class="wallet-hud">
  <div class="hud-balance">
    <span class="hud-label">WALLET</span>
    $<span id="hudAmt">0</span>.00
  </div>
  <div class="hud-free">✅ FREE PLAY</div>
  <a class="hud-btn btn-wallet" href="../wallet.html">← WALLET</a>
</div>

<!-- THE GAME -->
<div class="game-wrap">
  <iframe id="arcadeFrame" src="SuperTouch.html" title="SuperTouch Arcade" allowtransparency="true"></iframe>
</div>

<script>
const WALLET_KEY = 'arcade_wallet';
function getBalance() {
  const v = localStorage.getItem(WALLET_KEY);
  if (v === null) { localStorage.setItem(WALLET_KEY, '20'); return 20; }
  return parseFloat(v) || 0;
}
document.getElementById('hudAmt').textContent = getBalance().toFixed(0);
// Keep HUD fresh if storage changes elsewhere
window.addEventListener('storage', function(e) {
  if (e.key === WALLET_KEY) {
    document.getElementById('hudAmt').textContent = (parseFloat(e.newValue) || 0).toFixed(0);
  }
});
</script>
</body>
</html>
