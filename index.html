<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperTouch · Classic Arcade</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #010008;
    font-family: 'Arial', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── CENTER POPUP ── */
  .center-popup {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .center-popup.show { display: flex; }
  .center-popup-inner {
    background: #05050f;
    border: 3px solid #7fffd4;
    border-radius: 18px;
    padding: 28px 48px;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #7fffd4;
    text-align: center;
    box-shadow: 0 0 60px rgba(127,255,212,0.25), 0 8px 40px rgba(0,0,0,0.9);
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 80vw;
    line-height: 1.4;
  }
  .center-popup.lose .center-popup-inner { border-color: #ff3344; color: #ff3344; }
  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* ── BLOCKED OVERLAY ── */
  .blocked-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 24px;
  }
  .blocked-overlay.show { display: flex; }
  .blocked-overlay .bo-msg {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: #ff3344;
    letter-spacing: 2px;
  }
  .blocked-overlay .bo-sub {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: #664444;
    letter-spacing: 1px;
  }
  .btn-go-wallet {
    display: inline-block;
    background: #0a0a1a;
    border: 2px solid #ffd700;
    color: #ffd700;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 2px;
    padding: 12px 24px;
    border-radius: 8px;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .btn-go-wallet:hover { transform: scale(1.05); }

  /* ── GAME IFRAME ── */
  .game-wrap { width: 100%; flex: 1; }
  .game-wrap iframe {
    width: 100%;
    height: 100vh;
    border: none;
    display: block;
    background: #010008;
  }
</style>
</head>
<body>

<!-- CENTER POPUP -->
<div class="center-popup" id="centerPopup">
  <div class="center-popup-inner" id="centerPopupMsg"></div>
</div>

<!-- BLOCKED OVERLAY -->
<div class="blocked-overlay" id="blockedOverlay">
  <div style="font-size:48px">⛔</div>
  <div class="bo-msg">OUT OF CREDITS</div>
  <div class="bo-sub">You need at least $1.00 to play SuperTouch.</div>
  <a class="btn-go-wallet" href="../wallet/index.html">GO TO WALLET</a>
</div>

<!-- THE GAME -->
<div class="game-wrap">
  <iframe id="arcadeFrame" src="SuperTouch.html" title="SuperTouch Arcade" allowtransparency="true"></iframe>
</div>

<script>
const WALLET_KEY = 'arcade_wallet';

function getBalance() {
  const v = localStorage.getItem(WALLET_KEY);
  if (v === null) { localStorage.setItem(WALLET_KEY, '20'); return 20; }
  return parseFloat(v) || 0;
}
function setBalance(val) {
  const clamped = Math.max(0, Math.round(val * 100) / 100);
  localStorage.setItem(WALLET_KEY, String(clamped));
  return clamped;
}

let _popTmr;
function popup(msg, type) {
  const el = document.getElementById('centerPopup');
  const msgEl = document.getElementById('centerPopupMsg');
  msgEl.textContent = msg;
  el.className = 'center-popup show ' + (type || '');
  clearTimeout(_popTmr);
  _popTmr = setTimeout(() => el.classList.remove('show'), 3000);
}

function renderBlocked() {
  const bal = getBalance();
  const blocked = document.getElementById('blockedOverlay');
  if (bal <= 0) blocked.classList.add('show');
  else blocked.classList.remove('show');
}

// ── Intercept game selection messages from the iframe ─────────────────────────
// SuperTouch posts a message when user picks a game from the main menu.
// We listen for that, deduct $1, and either allow or block.
window.addEventListener('message', function(e) {
  if (!e.data || typeof e.data !== 'object') return;

  // Game selected from main menu
  if (e.data.type === 'SUPERTOUCH_GAME_SELECT') {
    const bal = getBalance();
    if (bal <= 0) {
      renderBlocked();
      // Tell iframe to cancel the launch
      try { document.getElementById('arcadeFrame').contentWindow.postMessage({ type: 'WALLET_BLOCKED' }, '*'); } catch(x) {}
      return;
    }
    const newBal = setBalance(bal - 1);
    renderBlocked();
    popup('-$1.00  ·  Balance: $' + newBal + '\n🕹️ Good luck!', '');
    // Tell iframe to proceed
    try { document.getElementById('arcadeFrame').contentWindow.postMessage({ type: 'WALLET_OK' }, '*'); } catch(x) {}
  }
});

// ── Also patch iframe directly as fallback ────────────────────────────────────
// If SuperTouch exposes a selectGame / launchGame / startGame function,
// patch it to require $1.
document.getElementById('arcadeFrame').addEventListener('load', function() {
  try {
    const fw = this.contentWindow;
    setTimeout(function() { patchSuperTouch(fw); }, 300);
  } catch(e) {}
});

function patchSuperTouch(fw) {
  // Try common function names used in arcade menu launchers
  const candidates = ['selectGame', 'launchGame', 'startGame', 'playGame', 'loadGame'];
  candidates.forEach(function(fnName) {
    if (typeof fw[fnName] === 'function' && !fw['_walletPatched_' + fnName]) {
      const orig = fw[fnName];
      fw[fnName] = function() {
        const bal = getBalance();
        if (bal <= 0) { renderBlocked(); return; }
        const newBal = setBalance(bal - 1);
        renderBlocked();
        popup('-$1.00  ·  Balance: $' + newBal + '\n🕹️ Good luck!', '');
        return orig.apply(fw, arguments);
      };
      fw['_walletPatched_' + fnName] = true;
      console.log('[Wallet] Patched SuperTouch.' + fnName);
    }
  });

  // Also intercept clicks on the game selection buttons inside the iframe
  // by watching for navigation away from the main menu via click interception
  try {
    fw.document.addEventListener('click', function(evt) {
      // Look for elements that are game-launch buttons (common class/role patterns)
      const target = evt.target.closest
        ? (evt.target.closest('.game-item') ||
           evt.target.closest('.game-tile') ||
           evt.target.closest('.menu-game') ||
           evt.target.closest('[data-game]') ||
           evt.target.closest('.arcade-btn'))
        : null;
      if (!target) return;
      const bal = getBalance();
      if (bal <= 0) {
        evt.preventDefault();
        evt.stopImmediatePropagation();
        renderBlocked();
        return;
      }
      const newBal = setBalance(bal - 1);
      renderBlocked();
      popup('-$1.00  ·  Balance: $' + newBal + '\n🕹️ Good luck!', '');
    }, true); // capture phase so we fire before the game's own handler
    console.log('[Wallet] SuperTouch click listener attached');
  } catch(e) {
    console.warn('[Wallet] Could not attach click listener to SuperTouch iframe:', e);
  }
}

renderBlocked();

// Keep blocked state fresh if wallet changes in another tab
window.addEventListener('storage', function(e) {
  if (e.key === WALLET_KEY) renderBlocked();
});
</script>
</body>
</html>
